<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本語N3文法 / Tata Bahasa Jepang N3</title>
<style>
  :root {
    --red: #e63946;
    --blue: #1d3557;
    --light-blue: #457b9d;
    --cream: #f1faee;
    --light: #a8dadc;
    --white: #ffffff;
    --gray: #6c757d;
    --light-gray: #f8f9fa;
    --success: #2d6a4f;
    --warning: #e9c46a;
    --danger: #e76f51;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; background: var(--cream); color: var(--blue); min-height: 100vh; }

  nav { background: var(--blue); color: white; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.3); }
  nav h1 { font-size: 1rem; font-weight: bold; line-height: 1.3; }
  nav h1 span { display: block; font-size: 0.72rem; color: var(--light); font-weight: normal; }
  .nav-btns { display: flex; gap: 8px; }
  .nav-btn { background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3); color: white; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; transition: background .2s; }
  .nav-btn:hover, .nav-btn.active { background: var(--light-blue); }

  .screen { display: none; padding: 16px; max-width: 680px; margin: 0 auto; }
  .screen.active { display: block; }

  .home-hero { text-align: center; padding: 24px 0 16px; }
  .home-hero h2 { font-size: 1.4rem; color: var(--blue); }
  .home-hero p { color: var(--gray); font-size: 0.85rem; margin-top: 4px; }
  .progress-bar-wrap { background: #ddd; border-radius: 8px; height: 10px; margin: 16px 0 4px; overflow: hidden; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--light-blue), var(--red)); border-radius: 8px; transition: width .5s; }
  .progress-label { font-size: 0.78rem; color: var(--gray); text-align: right; }

  .week-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
  .week-card { background: white; border-radius: 12px; padding: 16px; cursor: pointer; border: 2px solid transparent; transition: all .2s; box-shadow: 0 2px 6px rgba(0,0,0,.08); }
  .week-card:hover { border-color: var(--light-blue); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.15); }
  .week-card .week-num { font-size: 0.75rem; color: var(--light-blue); font-weight: bold; }
  .week-card .week-title { font-size: 0.95rem; font-weight: bold; margin: 4px 0 2px; }
  .week-card .week-title-id { font-size: 0.75rem; color: var(--gray); }
  .week-card .mini-bar { background: #eee; border-radius: 4px; height: 6px; overflow: hidden; margin-top: 10px; }
  .week-card .mini-fill { height: 100%; background: var(--light-blue); border-radius: 4px; }
  .week-card .mini-label { font-size: 0.68rem; color: var(--gray); margin-top: 2px; }

  .back-btn { display: inline-flex; align-items: center; gap: 6px; color: var(--light-blue); cursor: pointer; font-size: 0.85rem; margin-bottom: 16px; }
  .back-btn:hover { color: var(--blue); }
  .week-header { background: var(--blue); color: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .week-header .wk { font-size: 0.75rem; color: var(--light); }
  .week-header h2 { font-size: 1.3rem; margin: 4px 0 2px; }
  .week-header p { font-size: 0.82rem; color: #a8dadc; }

  .day-list { display: flex; flex-direction: column; gap: 10px; }
  .day-card { background: white; border-radius: 10px; padding: 14px 16px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 1px 4px rgba(0,0,0,.08); transition: all .2s; border-left: 4px solid transparent; }
  .day-card:hover { border-left-color: var(--light-blue); box-shadow: 0 3px 10px rgba(0,0,0,.12); }
  .day-card.completed { border-left-color: var(--success); }
  .day-card .day-num { font-size: 0.72rem; color: var(--gray); }
  .day-card .day-title { font-size: 0.95rem; font-weight: bold; }
  .day-card .day-grammar { font-size: 0.75rem; color: var(--light-blue); margin-top: 2px; }
  .day-card .day-badge { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; background: #eee; color: var(--gray); flex-shrink: 0; }
  .day-card.completed .day-badge { background: var(--success); color: white; }

  .lesson-header { background: linear-gradient(135deg, var(--blue), var(--light-blue)); color: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
  .lesson-header .breadcrumb { font-size: 0.72rem; color: var(--light); margin-bottom: 6px; }
  .lesson-header h2 { font-size: 1.25rem; font-weight: bold; }
  .lesson-header .lesson-sub { font-size: 0.82rem; color: #a8dadc; margin-top: 4px; }

  .grammar-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,.07); }
  .grammar-pattern { font-size: 1.05rem; font-weight: bold; color: var(--red); border-bottom: 2px solid var(--cream); padding-bottom: 8px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .pattern-badge { background: var(--cream); color: var(--blue); font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; font-weight: normal; font-family: monospace; }
  .meaning-ja { font-size: 0.85rem; color: var(--gray); margin-bottom: 6px; }
  .meaning-id { font-size: 0.9rem; color: var(--blue); font-weight: bold; background: var(--cream); padding: 8px 12px; border-radius: 8px; margin-bottom: 14px; border-left: 3px solid var(--light-blue); }
  .ex-label { font-size: 0.78rem; color: var(--gray); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
  .example { background: var(--light-gray); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; }
  .example .ja { font-size: 0.95rem; color: var(--blue); line-height: 1.6; }
  .example .ja strong { color: var(--red); }
  .example .id { font-size: 0.82rem; color: var(--gray); margin-top: 4px; font-style: italic; }
  .extra-example { background: #eef6f0; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; border-left: 3px solid var(--success); }
  .extra-example .ja { font-size: 0.95rem; color: var(--blue); line-height: 1.6; }
  .extra-example .ja strong { color: var(--red); }
  .extra-example .id { font-size: 0.82rem; color: var(--gray); margin-top: 4px; font-style: italic; }
  .extra-toggle { display: inline-flex; align-items: center; gap: 6px; background: none; border: 1px dashed var(--success); color: var(--success); padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 0.78rem; margin-top: 4px; margin-bottom: 4px; transition: all .2s; }
  .extra-toggle:hover { background: #eef6f0; }
  .extra-section { display: none; margin-top: 6px; }
  .extra-section.open { display: block; }
  .extra-label { font-size: 0.72rem; color: var(--success); font-weight: bold; letter-spacing: .5px; margin-bottom: 6px; margin-top: 2px; }
  .verbform-toggle { display: inline-flex; align-items: center; gap: 6px; background: none; border: 1px dashed var(--light-blue); color: var(--light-blue); padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 0.78rem; margin-top: 4px; margin-bottom: 4px; transition: all .2s; }
  .verbform-toggle:hover { background: #eaf2f8; }
  .verbform-section { display: none; margin-top: 8px; background: #eaf2f8; border-radius: 10px; padding: 12px 14px; }
  .verbform-section.open { display: block; }
  .verbform-section h5 { font-size: 0.75rem; color: var(--light-blue); font-weight: bold; letter-spacing: .5px; margin-bottom: 8px; text-transform: uppercase; }
  .verbform-row { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 6px; font-size: 0.83rem; }
  .verbform-row .vf-label { background: var(--light-blue); color: white; border-radius: 6px; padding: 2px 8px; font-size: 0.72rem; white-space: nowrap; flex-shrink: 0; margin-top: 1px; }
  .verbform-row .vf-body { color: var(--blue); line-height: 1.5; }
  .verbform-row .vf-body .vf-id { color: var(--gray); font-size: 0.78rem; display: block; margin-top: 1px; }
  .verbform-row .vf-body .vf-ex { color: var(--red); font-size: 0.78rem; display: block; margin-top: 2px; }

  .lesson-nav { display: flex; gap: 10px; margin-top: 20px; margin-bottom: 10px; flex-wrap: wrap; }
  .lesson-nav button { flex: 1; min-width: 100px; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-size: 0.88rem; font-weight: bold; transition: all .2s; }
  .btn-complete { background: var(--success); color: white; }
  .btn-complete:hover { background: #1b4332; }
  .btn-uncomplete { background: #adb5bd; color: white; }
  .btn-uncomplete:hover { background: #6c757d; }
  .btn-quiz { background: var(--red); color: white; }
  .btn-quiz:hover { background: #c1121f; }
  .btn-secondary { background: #eee; color: var(--blue); }
  .btn-secondary:hover { background: #ddd; }

  .quiz-header { background: var(--blue); color: white; border-radius: 12px; padding: 16px 20px; margin-bottom: 20px; }
  .quiz-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .quiz-title { font-size: 1rem; font-weight: bold; }
  .quiz-score-disp { font-size: 0.85rem; color: var(--light); }
  .quiz-progress { background: rgba(255,255,255,.2); border-radius: 4px; height: 6px; overflow: hidden; }
  .quiz-progress-fill { height: 100%; background: var(--warning); border-radius: 4px; transition: width .4s; }

  .quiz-question { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
  .q-label { font-size: 0.75rem; color: var(--gray); margin-bottom: 8px; }
  .q-text { font-size: 1rem; font-weight: bold; color: var(--blue); line-height: 1.6; margin-bottom: 6px; }
  .q-hint { font-size: 0.8rem; color: var(--gray); font-style: italic; }

  .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .quiz-opt { background: white; border: 2px solid #ddd; border-radius: 10px; padding: 12px 8px; cursor: pointer; font-size: 0.82rem; text-align: center; transition: all .2s; box-shadow: 0 1px 4px rgba(0,0,0,.06); line-height: 1.4; }
  .quiz-opt:hover:not(.disabled) { border-color: var(--light-blue); background: var(--cream); }
  .quiz-opt.correct { border-color: var(--success); background: #d8f3dc; color: var(--success); }
  .quiz-opt.wrong { border-color: var(--danger); background: #fde8df; color: var(--danger); }
  .quiz-opt.disabled { cursor: default; }

  .quiz-feedback { border-radius: 10px; padding: 14px 16px; margin-bottom: 16px; font-size: 0.88rem; display: none; }
  .quiz-feedback.show { display: block; }
  .correct-fb { background: #d8f3dc; color: var(--success); border: 1px solid #52b788; }
  .wrong-fb { background: #fde8df; color: var(--danger); border: 1px solid #e76f51; }
  .fb-detail { margin-top: 6px; font-size: 0.82rem; }

  .quiz-next-btn { width: 100%; padding: 14px; background: var(--blue); color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 0.95rem; font-weight: bold; transition: background .2s; display: none; }
  .quiz-next-btn.show { display: block; }
  .quiz-next-btn:hover { background: var(--light-blue); }

  .result-screen { text-align: center; padding: 30px 16px; }
  .result-emoji { font-size: 4rem; margin-bottom: 16px; }
  .result-score { font-size: 3rem; font-weight: bold; color: var(--blue); }
  .result-score span { font-size: 1.2rem; color: var(--gray); }
  .result-msg { font-size: 1rem; color: var(--gray); margin: 10px 0 24px; }
  .result-msg em { font-size: 0.88rem; color: var(--light-blue); font-style: normal; display: block; margin-top: 4px; }
  .result-btns { display: flex; flex-direction: column; gap: 10px; }
  .result-btns button { padding: 14px; border: none; border-radius: 10px; cursor: pointer; font-size: 0.95rem; font-weight: bold; }

  /* 穴埋め空欄 */
  .blank-box {
    display: inline-block;
    border-bottom: 2.5px solid var(--red);
    min-width: 72px;
    background: rgba(230,57,70,.06);
    border-radius: 4px;
    padding: 1px 10px;
    letter-spacing: 0.18em;
    color: rgba(0,0,0,0);
    vertical-align: middle;
  }
  .blank-badge { display: inline-block; background: var(--red); color: white; font-size: 0.72rem; border-radius: 20px; padding: 2px 10px; margin-bottom: 10px; }
  .id-toggle-btn { display: block; background: none; border: 1px dashed var(--light-blue); color: var(--light-blue); border-radius: 6px; padding: 5px 14px; font-size: 0.8rem; cursor: pointer; margin-top: 10px; }
  .id-toggle-btn:hover { background: rgba(69,123,157,.08); }

  /* ── 並べ替え問題 ── */
  .rearrange-sentence { background: white; padding: 18px 16px; border-radius: 10px; font-size: 1rem; line-height: 2.6; margin-bottom: 14px; color: var(--blue); font-weight: bold; }
  .rearrange-slot { display: inline-block; min-width: 78px; min-height: 36px; border: 2px dashed #bbb; margin: 0 4px; padding: 4px 10px; text-align: center; vertical-align: middle; background: rgba(0,0,0,.02); border-radius: 6px; cursor: pointer; color: var(--blue); font-weight: bold; transition: all .2s; }
  .rearrange-slot:hover { background: rgba(69,123,157,.08); }
  .rearrange-slot.empty { color: #aaa; font-weight: normal; font-size: 0.85rem; border-style: dashed; }
  .rearrange-slot.star { border-color: var(--red); background: rgba(230,57,70,.06); }
  .rearrange-slot.star.empty { color: var(--red); font-size: 1rem; }
  .rearrange-slot.correct { border-color: var(--success); background: #d8f3dc; color: var(--success); border-style: solid; }
  .rearrange-slot.wrong { border-color: var(--danger); background: #fde8df; color: var(--danger); border-style: solid; }
  .rearrange-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .rearrange-chip { background: white; border: 2px solid var(--light-blue); border-radius: 8px; padding: 9px 14px; cursor: pointer; font-size: 0.95rem; color: var(--blue); transition: all .2s; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
  .rearrange-chip:hover { background: var(--cream); }
  .rearrange-chip.used { background: #f0f0f0; color: #ccc; border-color: #ddd; cursor: default; box-shadow: none; }
  .rearrange-btn-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .rearrange-check-btn { flex: 2; padding: 14px; background: var(--red); color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 0.95rem; font-weight: bold; transition: background .2s; }
  .rearrange-check-btn:disabled { background: #ccc; cursor: default; }
  .rearrange-check-btn:not(:disabled):hover { background: #c1121f; }
  .rearrange-reset-btn { flex: 1; padding: 14px; background: white; color: var(--gray); border: 2px solid #ddd; border-radius: 10px; cursor: pointer; font-size: 0.9rem; font-weight: bold; transition: all .2s; }
  .rearrange-reset-btn:disabled { background: #f5f5f5; color: #ccc; border-color: #eee; cursor: default; }
  .rearrange-reset-btn:not(:disabled):hover { background: #f8f9fa; border-color: var(--gray); color: var(--blue); }

  /* ── 言い換えクイズ ── */
  .synonym-prompt { background: var(--blue); color: white; font-size: 1.5rem; font-weight: bold; padding: 22px 18px; border-radius: 10px; text-align: center; margin-bottom: 10px; letter-spacing: 0.04em; }
  .synonym-meaning { font-size: 0.88rem; color: var(--gray); margin-bottom: 8px; text-align: center; font-style: italic; }

  /* ── 動詞活用ドリル ── */
  .verb-drill-card { background: var(--blue); color: white; border-radius: 10px; padding: 24px 18px; text-align: center; margin-bottom: 14px; }
  .verb-drill-base { font-size: 1.8rem; font-weight: bold; letter-spacing: 0.05em; }
  .verb-drill-base ruby rt { color: var(--light); font-size: 0.45em; }
  .verb-drill-meaning { font-size: 0.85rem; color: var(--light); margin-top: 4px; font-style: italic; }
  .verb-drill-arrow { color: var(--warning); font-size: 1.4rem; margin: 10px 0 6px; }
  .verb-drill-form { background: var(--red); display: inline-block; padding: 8px 22px; border-radius: 20px; font-size: 1rem; font-weight: bold; }
  .verb-drill-form-id { display: block; font-size: 0.75rem; color: var(--light); margin-top: 6px; font-style: italic; }
  .verb-group-tag { display: inline-block; background: rgba(255,255,255,.18); border-radius: 12px; padding: 2px 10px; font-size: 0.72rem; margin-bottom: 8px; }

  /* Ruby / Furigana */
  ruby { ruby-align: center; }
  rt { font-size: 0.55em; color: #888; line-height: 1.5; }
  body.no-furigana rt { display: none; }
  body.no-furigana ruby { display: inline; }

  /* Quiz Indonesian box */
  .q-id-box { background: rgba(69,123,157,.12); border-left: 3px solid var(--light-blue); border-radius: 8px; padding: 8px 12px; font-size: 0.88rem; color: var(--blue); margin-top: 8px; }
  .q-id-flag { margin-right: 4px; }

  /* Romaji */
  .example .romaji, .extra-example .romaji { font-size: 0.76rem; color: #b0bec5; margin-top: 2px; letter-spacing: 0.04em; font-style: italic; }
  body.no-romaji .romaji { display: none; }

  /* ═══════════════════════════════════════
     スマホ対応 (600px以下)
     PCは今まで通り、スマホだけ変更
  ════════════════════════════════════════ */
  @media (max-width: 600px) {

    /* ── ナビ ── */
    nav { padding: 10px 12px; flex-wrap: wrap; gap: 6px; }
    nav h1 { font-size: 0.92rem; }
    nav h1 span { font-size: 0.68rem; }
    .nav-btns { flex-wrap: wrap; gap: 4px; }
    .nav-btn { font-size: 0.72rem; padding: 5px 9px; }

    /* ── 画面全体 ── */
    .screen { padding: 12px; }

    /* ── ホーム ── */
    .home-hero h2 { font-size: 1.2rem; }
    .week-grid { grid-template-columns: 1fr; gap: 10px; }
    .week-card { padding: 14px; }
    .week-card .week-title { font-size: 0.9rem; }

    /* ── 週・日一覧 ── */
    .week-header { padding: 16px; }
    .week-header h2 { font-size: 1.1rem; }
    .day-card { padding: 12px 14px; }
    .day-card .day-title { font-size: 0.9rem; }

    /* ── レッスン ── */
    .lesson-header { padding: 16px; }
    .lesson-header h2 { font-size: 1.1rem; }
    .grammar-card { padding: 16px; }
    .grammar-pattern { font-size: 0.95rem; }
    .example .ja, .extra-example .ja { font-size: 0.92rem; line-height: 1.8; }
    .example .romaji, .extra-example .romaji { font-size: 0.72rem; word-break: break-all; }
    .example .id, .extra-example .id { font-size: 0.8rem; }
    .meaning-id { font-size: 0.85rem; }

    /* ── 接続の説明（verbform） ── */
    .verbform-section { padding: 10px 12px; }
    .verbform-row { font-size: 0.8rem; }
    .verbform-row .vf-body .vf-id { font-size: 0.74rem; }

    /* ── レッスン下部ボタン ── */
    .lesson-nav { gap: 8px; }
    .lesson-nav button { font-size: 0.82rem; padding: 10px 6px; }

    /* ── クイズ ── */
    .quiz-question { padding: 16px; }
    .q-text { font-size: 0.95rem; line-height: 1.7; }
    .q-id-box { font-size: 0.82rem; }
    .quiz-options { grid-template-columns: 1fr; gap: 8px; }
    .quiz-opt { font-size: 0.85rem; padding: 13px 10px; text-align: left; }
    .quiz-next-btn { font-size: 0.9rem; padding: 13px; }

    /* ── 結果画面 ── */
    .result-score { font-size: 2.4rem; }
    .result-btns button { font-size: 0.9rem; padding: 13px; }

    /* ── ルビ（フリガナ）スマホ用に少し大きく ── */
    rt { font-size: 0.6em; }
  }

  /* ── アクセスコード画面 ── */
  #access-screen {
    position: fixed; inset: 0; background: var(--blue);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
  }
  #access-screen.hidden { display: none; }
  .access-box {
    background: white; border-radius: 16px; padding: 36px 32px;
    max-width: 360px; width: 90%; text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,.4);
  }
  .access-box h2 { font-size: 1.1rem; color: var(--blue); margin-bottom: 6px; }
  .access-box p  { font-size: 0.82rem; color: var(--gray); margin-bottom: 20px; line-height: 1.6; }
  .access-box input {
    width: 100%; padding: 12px 14px; border: 2px solid #ddd;
    border-radius: 8px; font-size: 1rem; text-align: center;
    letter-spacing: 0.1em; outline: none; margin-bottom: 12px;
  }
  .access-box input:focus { border-color: var(--light-blue); }
  .access-box button {
    width: 100%; padding: 12px; background: var(--blue); color: white;
    border: none; border-radius: 8px; font-size: 1rem; cursor: pointer;
  }
  .access-box button:hover { background: var(--light-blue); }
  .access-error { color: var(--red); font-size: 0.82rem; margin-top: 8px; min-height: 20px; }
</style>
</head>
<body>

<div id="access-screen">
  <div class="access-box">
    <h2>日本語N3 文法アプリ</h2>
    <p>アクセスコードを入力してください。<br>Masukkan kode akses untuk melanjutkan.</p>

const progress = JSON.parse(localStorage.getItem('n3-progress') || '{}');

function saveProgress() { localStorage.setItem('n3-progress', JSON.stringify(progress)); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function showHome() { renderHome(); showScreen('screen-home'); }

// ── HOME ──
function renderHome() {
  const done = totalDone(), total = 36;
  document.getElementById('total-bar').style.width = `${(done/total)*100}%`;
  document.getElementById('total-label').textContent = `${done} / ${total} pelajaran selesai`;
  const grid = document.getElementById('week-grid');
  grid.innerHTML = '';
  WEEKS.forEach(wk => {
    const daysDone = wk.days.filter((_, i) => isDone(wk.num, i+1)).length;
    const pct = Math.round((daysDone / wk.days.length) * 100);
    const c = document.createElement('div');
    c.className = 'week-card';
    c.onclick = () => showWeek(wk.num);
    c.innerHTML = `<div class="week-num">第${wk.num}週</div>
      <div class="week-title">${wk.title}</div>
      <div class="week-title-id">${wk.titleId}</div>
      <div class="mini-bar"><div class="mini-fill" style="width:${pct}%"></div></div>
      <div class="mini-label">${daysDone}/${wk.days.length} selesai</div>`;
    grid.appendChild(c);
  });
}

// ── WEEK ──
function renderWeek(wNum) {
  const wk = WEEKS[wNum-1];
  document.getElementById('week-header').innerHTML =
    `<div class="wk">第${wk.num}週</div><h2>${wk.title}</h2><p>${wk.titleId}</p>`;
  const list = document.getElementById('day-list');

  wk.days.forEach(d => {
    const done = isDone(wNum, d.day);

    c.className = `day-card ${done ? 'completed' : ''}`;

function renderLesson(wNum, dNum) {
  const wk = WEEKS[wNum-1], d = wk.days[dNum-1], done = isDone(wNum, dNum);
  let html = `<div class="lesson-header">
    <div class="breadcrumb">第${wNum}週 › ${dNum}日目</div>
    <h2>${d.title}</h2>
    <div class="lesson-sub">${d.titleId}</div>
  </div>`;
  d.grammar.forEach((g, gi) => {
    const extraKey = g.pattern;
    const extras = EXTRA_EXAMPLES[extraKey] || [];
    const cardId = `gc-${wNum}-${dNum}-${gi}`;
    const vfKey = g.badge;
    const vfData = VERBFORMS[vfKey] || null;
    const vfId = `vf-${wNum}-${dNum}-${gi}`;
    html += `<div class="grammar-card">
      <div class="grammar-pattern">${g.pattern}<span class="pattern-badge">${g.badge}</span></div>
      <div class="meaning-ja">${g.meaning}</div>
      <div class="meaning-id">${g.meaningId}</div>`;
    if (vfData) {
      html += `<button class="verbform-toggle" onclick="toggleVerbForm('${vfId}', this)">▼ 接続の仕方・動詞の形 / Cara pembentukan</button>
      <div class="verbform-section" id="${vfId}">
        <h5>${vfData.title}</h5>`;
      vfData.rows.forEach(r => {
        html += `<div class="verbform-row">
          <span class="vf-label">${r.label}</span>
          <span class="vf-body">${r.body}
            <span class="vf-id">${r.id}</span>
            ${r.ex ? `<span class="vf-ex">例: ${r.ex}</span>` : ''}
          </span>
        </div>`;
      });
      html += `</div>`;
    }
    html += `<div class="ex-label">Contoh Kalimat / 例文</div>`;
    g.examples.forEach(ex => {
      html += `<div class="example">
        <div class="ja">${addFurigana(ex.ja)}</div>
        <div class="romaji">${getRomaji(ex.ja)}</div>
        <div class="id">${ex.id}</div>
      </div>`;
    });
    if (extras.length > 0) {
      html += `<button class="extra-toggle" onclick="toggleExtra('${cardId}', this)">＋ 追加例文を見る / Lihat contoh tambahan (${extras.length})</button>
      <div class="extra-section" id="${cardId}">
        <div class="extra-label">追加例文 / Contoh Tambahan</div>`;
      extras.forEach(ex => {
        html += `<div class="extra-example">
          <div class="ja">${addFurigana(ex.ja)}</div>
          <div class="romaji">${getRomaji(ex.ja)}</div>
          <div class="id">${ex.id}</div>
        </div>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  });
  const prev = dNum > 1 ? dNum-1 : null, next = dNum < wk.days.length ? dNum+1 : null;
  html += `<div class="lesson-nav">`;
  if (prev) html += `<button class="btn-secondary" onclick="showLesson(${wNum},${prev})">← ${prev}日目</button>`;
  html += `<button class="${done ? 'btn-uncomplete' : 'btn-complete'}" onclick="toggleComplete(${wNum},${dNum})">${done ? '✓ 完了済み（取消）' : '完了 ✓'}</button>`;
  html += `<button class="btn-quiz" onclick="startDayQuiz(${wNum},${dNum})">クイズ 🎯</button>`;
  if (next) html += `<button class="btn-secondary" onclick="showLesson(${wNum},${next})">${next}日目 →</button>`;
  html += `</div>`;
  document.getElementById('lesson-content').innerHTML = html;
  document.getElementById('lesson-back').textContent = `← 第${wNum}週 / Minggu ${wNum}`;
  document.getElementById('lesson-back').onclick = () => showWeek(wNum);
}

function toggleComplete(w, d) {
  if (isDone(w, d)) {
    delete progress[`${w}-${d}`];
    saveProgress();
  } else {

  renderLesson(w, d);
}

// ── QUIZ ──
function allGrammarList() {
  const a = [];
  WEEKS.forEach(wk => wk.days.forEach(d => d.grammar.forEach(g => a.push(g))));
  return a;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

function buildQuizItems(dayObjs) {
  const all = allGrammarList();
  const items = [];
  dayObjs.forEach(({g, wk}) => {
    g.examples.forEach(ex => {
      const distractors = shuffle(all.filter(x => x.pattern !== g.pattern)).slice(0, 3).map(x => x.pattern);
      items.push({
        question: ex.ja.replace(/<strong>/g,'').replace(/<\/strong>/g,''),
        questionHtml: ex.ja,
        questionId: ex.id,
        correct: g.pattern,
        options: shuffle([g.pattern, ...distractors]),
        meaningId: g.meaningId
      });
    });
  });
  return shuffle(items);
}

let isBlankQuiz = false;

function buildBlankQuizItems(dayObjs) {
  // 全例文の <strong> テキストをバッジ付きで収集
  const allForms = [];
  WEEKS.forEach(wk => wk.days.forEach(d => d.grammar.forEach(g => {
    g.examples.forEach(ex => {
      const m = ex.ja.match(/<strong>([^<]*)<\/strong>/);
      if (m) allForms.push({ form: m[1], pattern: g.pattern, badge: g.badge });
    });
  })));

  // 紛らわしさスコアで選択肢を選ぶ（高難易度版）
  function pickDistractors(correctForm, correctPattern, correctBadge) {
    const correctLen = correctForm.length;
    const end1 = correctForm.slice(-1);
    const end2 = correctForm.slice(-2);
    const end3 = correctForm.slice(-3);
    const end4 = correctForm.slice(-4);
    const begin1 = correctForm.slice(0, 1);
    const begin2 = correctForm.slice(0, 2);

    // 文字の重なり度（共通文字がいくつあるか）
    function charOverlap(a, b) {
      const set = new Set(a.split(''));
      let n = 0;
      for (const ch of b) if (set.has(ch)) n++;
      return n;
    }

    const candidates = allForms
      .filter(e => e.pattern !== correctPattern && e.form !== correctForm)
      .map(e => {
        let score = 0;
        // 同じバッジ（活用形カテゴリ）— 最重要
        if (e.badge === correctBadge) score += 15;
        // バッジの最初の単語が一致
        else if (e.badge.split('＋')[0] === correctBadge.split('＋')[0]) score += 7;
        // 語尾の一致（長いほど高スコア）
        if (e.form.endsWith(end4) && end4.length === 4) score += 14;
        else if (e.form.endsWith(end3)) score += 9;
        else if (e.form.endsWith(end2)) score += 5;
        else if (e.form.endsWith(end1)) score += 2;
        // 語頭の一致（同じ動詞・似た動詞）
        if (e.form.startsWith(begin2)) score += 6;
        else if (e.form.startsWith(begin1)) score += 2;
        // 文字数が近いほど高スコア（差が大きいと急減）
        const diff = Math.abs(e.form.length - correctLen);
        score += Math.max(0, 7 - diff * 2);
        // 共通文字の数（似た見た目）
        score += Math.min(charOverlap(correctForm, e.form), 4);
        return { form: e.form, score };
      })
      .sort((a, b) => b.score - a.score);

    // 上位6件に絞ってランダムに3つ（より紛らわしい候補だけから選ぶ）
    return shuffle(candidates.slice(0, 6)).slice(0, 3).map(e => e.form);
  }

  const items = [];
  dayObjs.forEach(({g, wk}) => {
    g.examples.forEach(ex => {
      const match = ex.ja.match(/<strong>([^<]*)<\/strong>/);
      if (!match) return;
      const correctForm = match[1];
      const blankHtml = ex.ja.replace(/<strong>[^<]*<\/strong>/, '<span class="blank-box">＿＿＿＿＿</span>');
      const distractors = pickDistractors(correctForm, g.pattern, g.badge);
      items.push({
        questionBlankHtml: blankHtml,
        questionId: ex.id,
        badge: g.badge,
        correct: correctForm,
        pattern: g.pattern,
        options: shuffle([correctForm, ...distractors]),
        meaningId: g.meaningId
      });
    });
  });
  return shuffle(items);
}

function buildRearrangeItems() {
  return shuffle(REARRANGE_QUESTIONS).slice(0, 12).map(q => {
    // chipPool: shuffled parts (this is what's shown to user)
    const chipPool = shuffle([...q.parts]);
    return { ...q, chipPool };
  });
}

function showRearrangeQuiz() {
  isRearrange = true;
  isBlankQuiz = false;
  isSynonymQuiz = false;
  isVerbDrill = false;
  quizItems = buildRearrangeItems();
  quizTitle = '並べ替え / Penyusunan Kata';
  qIdx = 0; qScore = 0; qAnswered = false;
  rearrangeOrder = [null, null, null, null];
  document.getElementById('quiz-back').onclick = () => { isRearrange = false; showHome(); };
  renderRearrangeQ();
  showScreen('screen-quiz');
}

function renderRearrangeQ() {
  if (qIdx >= quizItems.length) { renderResult(); return; }
  const q = quizItems[qIdx];
  const pct = (qIdx / quizItems.length) * 100;

  // Build sentence display with slots
  let slotsHtml = '';
  for (let i = 0; i < 4; i++) {
    const chipIdx = rearrangeOrder[i];
    const filled = chipIdx !== null;
    const isStar = i === q.starIdx;
    const cls = `rearrange-slot${isStar ? ' star' : ''}${filled ? '' : ' empty'}`;
    const inner = filled ? addFurigana(q.chipPool[chipIdx]) : (isStar ? '★' : (i+1));
    slotsHtml += `<span class="${cls}" onclick="clearRearrangeSlot(${i})">${inner}</span>`;
  }
  const sentenceHtml = `${addFurigana(q.prefix)} ${slotsHtml} ${addFurigana(q.suffix)}`;

  // Build chips
  const chipsHtml = q.chipPool.map((part, idx) => {
    const used = rearrangeOrder.includes(idx);
    return `<div class="rearrange-chip${used ? ' used' : ''}" onclick="${used ? '' : `placeRearrangeChip(${idx})`}">${addFurigana(part)}</div>`;
  }).join('');

  const allFilled = !rearrangeOrder.includes(null);

  document.getElementById('quiz-content').innerHTML = `
    <div class="quiz-header">
      <div class="quiz-meta">
        <div class="quiz-title">${quizTitle}</div>
        <div class="quiz-score-disp">${qScore}/${qIdx} 正解</div>
      </div>
      <div class="quiz-progress"><div class="quiz-progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="quiz-question">
      <div class="q-label">問題 ${qIdx+1} / ${quizItems.length} — 正しい順番に並べて、★ に入る言葉を答えよう / Susun kata-kata dengan benar dan jawab apa yang masuk di posisi ★</div>
      <div class="rearrange-sentence">${sentenceHtml}</div>
      <button class="id-toggle-btn" id="id-toggle-btn" onclick="toggleIdBox()">🇮🇩 インドネシア語訳を見る / Lihat terjemahan</button>
      <div class="q-id-box" id="blank-id-box" style="display:none"><span class="q-id-flag">🇮🇩</span>${q.meaningId}</div>
    </div>
    <div class="rearrange-chips">${chipsHtml}</div>
    <div class="rearrange-btn-row">
      <button class="rearrange-check-btn" id="rearrange-check" ${allFilled && !qAnswered ? '' : 'disabled'} onclick="checkRearrange()">確認する / Cek Jawaban</button>
      <button class="rearrange-reset-btn" id="rearrange-reset" ${rearrangeOrder.some(x => x !== null) && !qAnswered ? '' : 'disabled'} onclick="resetRearrange()">↺ リセット</button>
    </div>
    <div class="quiz-feedback" id="qfb"></div>
    <button class="quiz-next-btn" id="qnext" onclick="nextRearrange()">
      ${qIdx+1 < quizItems.length ? '次の問題 →' : '結果を見る 🎉'}
    </button>`;
}

function placeRearrangeChip(chipIdx) {
  if (qAnswered) return;
  if (rearrangeOrder.includes(chipIdx)) return;
  const firstEmpty = rearrangeOrder.indexOf(null);
  if (firstEmpty === -1) return;
  rearrangeOrder[firstEmpty] = chipIdx;
  renderRearrangeQ();
}

function clearRearrangeSlot(slotIdx) {
  if (qAnswered) return;
  if (rearrangeOrder[slotIdx] === null) return;
  rearrangeOrder[slotIdx] = null;
  renderRearrangeQ();
}

function resetRearrange() {
  if (qAnswered) return;
  rearrangeOrder = [null, null, null, null];
  renderRearrangeQ();
}

function checkRearrange() {
  if (qAnswered) return;
  if (rearrangeOrder.includes(null)) return;
  qAnswered = true;
  const q = quizItems[qIdx];
  let allOk = true;
  for (let i = 0; i < 4; i++) {
    if (q.chipPool[rearrangeOrder[i]] !== q.parts[i]) { allOk = false; break; }
  }
  if (allOk) qScore++;

  // Re-render the sentence with correct/wrong markers
  let slotsHtml = '';
  for (let i = 0; i < 4; i++) {
    const chipIdx = rearrangeOrder[i];
    const userPart = q.chipPool[chipIdx];
    const correctPart = q.parts[i];
    const ok = userPart === correctPart;
    const isStar = i === q.starIdx;
    const cls = `rearrange-slot${isStar ? ' star' : ''} ${ok ? 'correct' : 'wrong'}`;
    slotsHtml += `<span class="${cls}">${addFurigana(userPart)}</span>`;
  }
  const correctSentence = q.prefix + q.parts.join('') + q.suffix;
  const starAnswer = q.parts[q.starIdx];

  document.querySelector('.rearrange-sentence').innerHTML =
    `${addFurigana(q.prefix)} ${slotsHtml} ${addFurigana(q.suffix)}`;
  document.getElementById('rearrange-check').disabled = true;
  // インドネシア語訳を自動表示
  const idBox = document.getElementById('blank-id-box');
  const idBtn = document.getElementById('id-toggle-btn');
  if (idBox) idBox.style.display = 'block';
  if (idBtn) idBtn.textContent = '🇮🇩 インドネシア語訳を隠す / Sembunyikan terjemahan';

  const fb = document.getElementById('qfb');
  fb.className = `quiz-feedback show ${allOk ? 'correct-fb' : 'wrong-fb'}`;
  fb.innerHTML = allOk
    ? `<strong>正解！ Benar! ✓</strong>
       <div class="fb-detail">★ の答え: <strong>${starAnswer}</strong><br>
       正しい文: ${addFurigana(correctSentence)}<br>
       文法: ${q.pattern}</div>`
    : `<strong>不正解 Salah. ✗</strong>
       <div class="fb-detail">★ の答え: <strong>${starAnswer}</strong><br>
       正しい文: ${addFurigana(correctSentence)}<br>
       文法: ${q.pattern}</div>`;
  document.getElementById('qnext').classList.add('show');
}

function nextRearrange() {
  qIdx++;
  qAnswered = false;
  rearrangeOrder = [null, null, null, null];
  renderRearrangeQ();
}

    meaningJa:"〜という目的で", meaningId:"Untuk / Demi (tujuan)" },
  { forms:["〜すぎる","〜あまりに"],
    meaningJa:"程度が大きすぎる", meaningId:"Terlalu / Terlampau" },
  { forms:["〜たがる","〜たいと思っている"],
    meaningJa:"（第三者が）〜したい", meaningId:"(Orang lain) ingin melakukan sesuatu" },
];

function buildSynonymItems() {
  // 全フォームを集めてディストラクター候補に
  const allForms = [];
  SYNONYM_GROUPS.forEach((g, gIdx) => {
    g.forms.forEach(f => allForms.push({ form: f, group: gIdx }));
  });

  const items = [];
  SYNONYM_GROUPS.forEach((g, gIdx) => {
    if (g.forms.length < 2) return;
    g.forms.forEach((prompt, pIdx) => {
      const candidates = g.forms.filter((_, i) => i !== pIdx);
      const correct = shuffle(candidates)[0];
      // 別グループからディストラクター3つ
      const distractors = shuffle(
        allForms.filter(f => f.group !== gIdx)
      ).slice(0, 3).map(f => f.form);
      items.push({
        promptForm: prompt,
        correct: correct,
        options: shuffle([correct, ...distractors]),
        meaningJa: g.meaningJa,
        meaningId: g.meaningId,
      });
    });
  });
  return shuffle(items).slice(0, 12);
}

  isSynonymQuiz = true;

  isVerbDrill = false;

}

const VERB_FORMS_LIST = [
  { key:"passive",     label:"受身形",     labelId:"Bentuk Pasif" },
  { key:"causative",   label:"使役形",     labelId:"Bentuk Kausatif" },
  { key:"causPassive", label:"使役受身形", labelId:"Bentuk Kausatif Pasif" },
  { key:"potential",   label:"可能形",     labelId:"Bentuk Potensial" },
  { key:"nai",         label:"ない形",     labelId:"Bentuk Negatif" },
  { key:"te",          label:"て形",       labelId:"Bentuk Te" },
];

function buildVerbDrillItems() {
  // 動詞×活用形の組み合わせを大量に作って、その中からランダムに12個
  const allCombos = [];
  VERBS.forEach(v => {
    VERB_FORMS_LIST.forEach(f => {
      allCombos.push({ verb: v, form: f });
    });
  });
  const picked = shuffle(allCombos).slice(0, 12);

  return picked.map(({ verb, form }) => {
    const correct = verb[form.key];

    // 同じ動詞の他の活用形だけを選択肢に使う
    const sameVerbOther = VERB_FORMS_LIST
      .filter(f => f.key !== form.key)
      .map(f => verb[f.key])
      .filter(x => x !== correct);

    // 重複を除いてシャッフルして3つ取る
    const uniqueOther = [...new Set(sameVerbOther)];
    const distractors = shuffle(uniqueOther).slice(0, 3);

    return {
      verb: verb.base,
      reading: verb.reading,
      mean: verb.mean,
      group: verb.group,
      formLabel: form.label,
      formLabelId: form.labelId,
      correct,
      options: shuffle([correct, ...distractors]),
    };
  });
}

function showVerbDrill() {
  isVerbDrill = true;
  isSynonymQuiz = false;
  isBlankQuiz = false;
  isRearrange = false;
  quizItems = buildVerbDrillItems();
  quizTitle = '活用ドリル / Drill Konjugasi';
  qIdx = 0; qScore = 0; qAnswered = false;
  document.getElementById('quiz-back').onclick = () => { isVerbDrill = false; showHome(); };
  renderQuizQ();
  showScreen('screen-quiz');
}

function startDayQuiz(wNum, dNum) {
  const wk = WEEKS[wNum-1], d = wk.days[dNum-1];
  const pairs = d.grammar.map(g => ({g, wk}));
  quizItems = buildQuizItems(pairs);
  quizTitle = `第${wNum}週 ${dNum}日目 クイズ`;
  qIdx = 0; qScore = 0; qAnswered = false;
  document.getElementById('quiz-back').onclick = () => showLesson(wNum, dNum);
  renderQuizQ();
  showScreen('screen-quiz');
}

function renderQuizQ() {
  if (isRearrange) { renderRearrangeQ(); return; }
  if (qIdx >= quizItems.length) { renderResult(); return; }
  const q = quizItems[qIdx];
  const pct = (qIdx / quizItems.length) * 100;
  let questionBlock = '';
  if (isVerbDrill) {
    const groupLabel = q.group === 1 ? "Group 1 (五段)" : q.group === 2 ? "Group 2 (一段)" : "Group 3 (不規則)";
    const baseRuby = `<ruby>${q.verb}<rt>${q.reading}</rt></ruby>`;
    questionBlock = `
      <div class="q-label">問題 ${qIdx+1} / ${quizItems.length} — 動詞を活用してください / Konjugasikan kata kerja berikut</div>
      <div class="verb-drill-card">
        <span class="verb-group-tag">${groupLabel}</span>
        <div class="verb-drill-base">${baseRuby}</div>
        <div class="verb-drill-meaning">${q.mean}</div>
        <div class="verb-drill-arrow">↓</div>
        <span class="verb-drill-form">${q.formLabel}</span>
        <span class="verb-drill-form-id">${q.formLabelId}</span>
      </div>`;
  } else if (isSynonymQuiz) {
    questionBlock = `
      <div class="q-label">問題 ${qIdx+1} / ${quizItems.length} — 同じ意味の表現はどれですか？ / Mana yang punya arti sama?</div>
      <div class="synonym-prompt">${q.promptForm}</div>
      <button class="id-toggle-btn" id="id-toggle-btn" onclick="toggleIdBox()">🇮🇩 インドネシア語訳を見る / Lihat terjemahan</button>
      <div class="q-id-box" id="blank-id-box" style="display:none"><span class="q-id-flag">🇮🇩</span>${q.meaningId}</div>`;
  } else if (isBlankQuiz) {
    questionBlock = `
      <div class="q-label">問題 ${qIdx+1} / ${quizItems.length} — 空欄に入る言葉はどれですか？ / Pilih kata yang tepat untuk mengisi titik-titik!</div>
      <div class="q-text">${addFurigana(q.questionBlankHtml)}</div>
      <button class="id-toggle-btn" id="id-toggle-btn" onclick="toggleIdBox()">🇮🇩 インドネシア語訳を見る / Lihat terjemahan</button>
      <div class="q-id-box" id="blank-id-box" style="display:none"><span class="q-id-flag">🇮🇩</span>${q.questionId}</div>`;
  } else {
    questionBlock = `
      <div class="q-label">問題 ${qIdx+1} / ${quizItems.length} — この文に使われている文法はどれですか？</div>
      <div class="q-text">${addFurigana(q.questionHtml)}</div>
      <div class="q-id-box"><span class="q-id-flag">🇮🇩</span>${q.questionId}</div>`;
  }
  document.getElementById('quiz-content').innerHTML = `
    <div class="quiz-header">
      <div class="quiz-meta">
        <div class="quiz-title">${quizTitle}</div>
        <div class="quiz-score-disp">${qScore}/${qIdx} 正解</div>
      </div>
      <div class="quiz-progress"><div class="quiz-progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="quiz-question">${questionBlock}</div>
    <div class="quiz-options">
      ${q.options.map((opt,i) => `<div class="quiz-opt" id="qo${i}" onclick="pickOpt(${i})">${opt}</div>`).join('')}
    </div>
    <div class="quiz-feedback" id="qfb"></div>
    <button class="quiz-next-btn" id="qnext" onclick="nextQ()">
      ${qIdx+1 < quizItems.length ? '次の問題 →' : '結果を見る 🎉'}
    </button>`;
}

function pickOpt(i) {
  if (qAnswered) return;
  qAnswered = true;
  const q = quizItems[qIdx];
  const sel = q.options[i];
  const ok = sel === q.correct;
  if (ok) qScore++;
  document.querySelectorAll('.quiz-opt').forEach((el, idx) => {
    el.classList.add('disabled');
    if (q.options[idx] === q.correct) el.classList.add('correct');
    else if (idx === i && !ok) el.classList.add('wrong');
  });
  const fb = document.getElementById('qfb');
  fb.className = `quiz-feedback show ${ok ? 'correct-fb' : 'wrong-fb'}`;
  if (isVerbDrill) {
    fb.innerHTML = ok
      ? `<strong>正解！ Benar! ✓</strong><div class="fb-detail">${q.verb} → <strong>${q.correct}</strong>（${q.formLabel}）</div>`
      : `<strong>不正解 Salah. ✗</strong><div class="fb-detail">正解: <strong>${q.correct}</strong><br>${q.verb} を ${q.formLabel} に活用</div>`;
  } else if (isSynonymQuiz) {
    fb.innerHTML = ok
      ? `<strong>正解！ Benar! ✓</strong><div class="fb-detail">「${q.promptForm}」 ≈ 「${q.correct}」<br>${q.meaningJa}<br>🇮🇩 ${q.meaningId}</div>`
      : `<strong>不正解 Salah. ✗</strong><div class="fb-detail">正解: <strong>${q.correct}</strong><br>「${q.promptForm}」 ≈ 「${q.correct}」<br>${q.meaningJa}<br>🇮🇩 ${q.meaningId}</div>`;
    // 解答後はインドネシア語訳を自動表示
    const idBox = document.getElementById('blank-id-box');
    const idBtn = document.getElementById('id-toggle-btn');
    if (idBox) { idBox.style.display = 'block'; }
    if (idBtn) { idBtn.textContent = '🇮🇩 インドネシア語訳を隠す / Sembunyikan terjemahan'; }
  } else if (isBlankQuiz) {
    fb.innerHTML = ok
      ? `<strong>正解！ Benar! ✓</strong><div class="fb-detail"><span class="blank-badge">${q.badge}</span> ${q.pattern}<br>${q.meaningId}</div>`
      : `<strong>不正解 Salah. ✗</strong><div class="fb-detail">正解: <strong>${q.correct}</strong><br><span class="blank-badge">${q.badge}</span> ${q.pattern}<br>${q.meaningId}</div>`;
    // 解答後はインドネシア語訳を表示する
    const idBox = document.getElementById('blank-id-box');
    const idBtn = document.getElementById('id-toggle-btn');
    if (idBox) { idBox.style.display = 'block'; }
    if (idBtn) { idBtn.textContent = '🇮🇩 インドネシア語訳を隠す / Sembunyikan terjemahan'; }
  } else {
    fb.innerHTML = ok
      ? `<strong>正解！ Benar! ✓</strong><div class="fb-detail">${q.meaningId}</div>`
      : `<strong>不正解 Salah. ✗</strong><div class="fb-detail">正解: <strong>${q.correct}</strong><br>${q.meaningId}</div>`;
  }
  document.getElementById('qnext').classList.add('show');
}

function toggleIdBox() {
  const box = document.getElementById('blank-id-box');
  const btn = document.getElementById('id-toggle-btn');
  if (!box) return;
  const hidden = box.style.display === 'none';
  box.style.display = hidden ? 'block' : 'none';
  btn.textContent = hidden
    ? '🇮🇩 インドネシア語訳を隠す / Sembunyikan terjemahan'
    : '🇮🇩 インドネシア語訳を見る / Lihat terjemahan';
}

function nextQ() { qIdx++; qAnswered = false; renderQuizQ(); }

function renderResult() {
  const pct = Math.round((qScore / quizItems.length) * 100);
  const [emoji, msg, msgId] = pct >= 80 ? ['🎉','Luar biasa! Hebat sekali!','素晴らしい！'] :
    pct >= 60 ? ['😊','Bagus! Terus semangat!','よくできました！'] :
    pct >= 40 ? ['🙂','Lumayan! Masih bisa lebih baik.','もう少し頑張りましょう！'] :
    ['😢','Terus berlatih ya!','もっと練習しましょう！'];
  const barColor = pct>=80 ? '#2d6a4f' : pct>=60 ? '#457b9d' : '#e76f51';
  document.getElementById('quiz-content').innerHTML = `
    <div class="result-screen">
      <div class="result-emoji">${emoji}</div>
      <div class="result-score">${qScore}<span>/${quizItems.length}</span></div>
      <div class="result-msg">${msg}<em>${msgId}</em></div>
      <div style="background:#eee;border-radius:8px;height:12px;overflow:hidden;margin-bottom:24px">
        <div style="width:${pct}%;height:100%;background:${barColor};border-radius:8px;transition:width .6s"></div>
      </div>
      <div class="result-btns">
        <button style="background:var(--red);color:white" onclick="replayQuiz()">もう一度 / Ulangi 🔄</button>
        <button style="background:var(--blue);color:white" onclick="showHome()">ホームへ / Beranda 🏠</button>
      </div>
    </div>`;
}

function replayQuiz() {
  qIdx = 0; qScore = 0; qAnswered = false;
  quizItems = shuffle(quizItems);
  if (isRearrange) {
    rearrangeOrder = [null, null, null, null];
    renderRearrangeQ();
  } else {
    renderQuizQ();
  }
}

// ── ROMAJI ──
const ROMAJI = {
  // 2-char combos (checked before single chars)
  'きゃ':'kya','きゅ':'kyu','きょ':'kyo',
  'しゃ':'sha','しゅ':'shu','しょ':'sho',
  'ちゃ':'cha','ちゅ':'chu','ちょ':'cho',
  'にゃ':'nya','にゅ':'nyu','にょ':'nyo',
  'ひゃ':'hya','ひゅ':'hyu','ひょ':'hyo',
  'みゃ':'mya','みゅ':'myu','みょ':'myo',
  'りゃ':'rya','りゅ':'ryu','りょ':'ryo',
  'ぎゃ':'gya','ぎゅ':'gyu','ぎょ':'gyo',
  'じゃ':'ja','じゅ':'ju','じょ':'jo',
  'ぢゃ':'ja','ぢゅ':'ju','ぢょ':'jo',
  'びゃ':'bya','びゅ':'byu','びょ':'byo',
  'ぴゃ':'pya','ぴゅ':'pyu','ぴょ':'pyo',
  'ふぁ':'fa','ふぃ':'fi','ふぇ':'fe','ふぉ':'fo',
  // Single chars
  'あ':'a','い':'i','う':'u','え':'e','お':'o',
  'か':'ka','き':'ki','く':'ku','け':'ke','こ':'ko',
  'さ':'sa','し':'shi','す':'su','せ':'se','そ':'so',
  'た':'ta','ち':'chi','つ':'tsu','て':'te','と':'to',
  'な':'na','に':'ni','ぬ':'nu','ね':'ne','の':'no',
  'は':'ha','ひ':'hi','ふ':'fu','へ':'he','ほ':'ho',
  'ま':'ma','み':'mi','む':'mu','め':'me','も':'mo',
  'や':'ya','ゆ':'yu','よ':'yo',
  'ら':'ra','り':'ri','る':'ru','れ':'re','ろ':'ro',
  'わ':'wa','を':'o','ん':'n',
  'が':'ga','ぎ':'gi','ぐ':'gu','げ':'ge','ご':'go',
  'ざ':'za','じ':'ji','ず':'zu','ぜ':'ze','ぞ':'zo',
  'だ':'da','ぢ':'ji','づ':'zu','で':'de','ど':'do',
  'ば':'ba','び':'bi','ぶ':'bu','べ':'be','ぼ':'bo',
  'ぱ':'pa','ぴ':'pi','ぷ':'pu','ぺ':'pe','ぽ':'po',
  'ぁ':'a','ぃ':'i','ぅ':'u','ぇ':'e','ぉ':'o',
  'ゃ':'ya','ゅ':'yu','ょ':'yo','ー':'-',
};

function getRomaji(html) {
  // 1. Apply furigana → kanji become <ruby>X<rt>よみ</rt></ruby>
  const marked = addFurigana(html);
  // 2. Extract reading from ruby tags (kanji → hiragana)
  let text = marked.replace(/<ruby>[^<]*<rt>([^<]*)<\/rt><\/ruby>/g, '$1');
  // 3. Remove remaining HTML tags (<strong> etc.)
  text = text.replace(/<[^>]+>/g, '');
  // 4. Katakana → hiragana
  text = text.replace(/[\u30A1-\u30F6]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0x60));
  // 5. Convert hiragana → romaji char by char (2-char combos first)
  let result = '', i = 0;
  while (i < text.length) {
    const two = text[i] + (text[i+1] || '');
    if (ROMAJI[two]) { result += ROMAJI[two]; i += 2; continue; }
    const ch = text[i];
    if (ch === 'っ') {
      const nxt2 = text[i+1] + (text[i+2] || '');
      const nxt1 = text[i+1] || '';
      const r = ROMAJI[nxt2] || ROMAJI[nxt1] || '';
      if (r) result += r[0];
      i++; continue;
    }
    if (ROMAJI[ch] !== undefined) { result += ROMAJI[ch]; i++; continue; }
    // Japanese punctuation → Latin
    if (ch === '。') { result += '. '; i++; continue; }
    if (ch === '、') { result += ', '; i++; continue; }
    if (ch === '「' || ch === '『' || ch === '（') { result += '"'; i++; continue; }
    if (ch === '」' || ch === '』' || ch === '）') { result += '"'; i++; continue; }
    if (ch === '・' || ch === '　') { result += ' '; i++; continue; }
    if (ch === '〜' || ch === '～') { result += '~'; i++; continue; }
    if (ch === '！') { result += '! '; i++; continue; }
    if (ch === '？') { result += '? '; i++; continue; }
    result += ch; // unregistered kanji kept as-is
    i++;
  }
  // ── 助詞「は」→ "wa" に修正 ──
  // 単語内部の は（hakkiri, hazu など）は文頭にくるため影響しない
  // 母(haha)等の単語内 "aha" は READINGS で一括変換済みなので
  // ここでの "aha"→"awa" は適用しない（誤変換防止）
  result = result
    .replace(/niha/g,  'niwa')  // には
    .replace(/deha/g,  'dewa')  // では
    .replace(/toha/g,  'towa')  // とは
    .replace(/moha/g,  'mowa')  // もは / 〜もは
    .replace(/kaha/g,  'kawa')  // か＋は
    .replace(/nha/g,   'nwa')   // ん＋は
    .replace(/iha/g,   'iwa')   // 私は・君は など（〜iは）
    .replace(/eha/g,   'ewa')   // 彼は など（〜eは）
    .replace(/uha/g,   'uwa')   // 学校は など（〜uは）
    // aha→awa：歌は(utaha)→(utawa) など。母(はは→haha)は保護してから変換
    .replace(/haha/g, '\x00HAHA\x00')
    .replace(/aha/g,   'awa')   // 歌は など（〜aは）
    .replace(/\x00HAHA\x00/g, 'haha')
    // oha→owa：〜oは パターン（該当例があれば対応）
    .replace(/oha/g,   'owa')   // 〜oは
    // ── 助詞「へ」→ "e" に修正 ──
    // 単語内部の へ（heya, henji など）は文頭にくるため影響しない
    .replace(/([aiueon])he/g, '$1e'); // 〜へ（方向の助詞）
  return result.trim();
}

let romajiOn = true;
function toggleRomaji() {
  romajiOn = !romajiOn;
  document.body.classList.toggle('no-romaji', !romajiOn);
  document.getElementById('romaji-btn').textContent = romajiOn ? 'ローマ字あり' : 'ローマ字なし';
}

function addFurigana(html) {
  // Split the HTML string into alternating text/tag chunks
  const parts = html.split(/(<[^>]+>)/);
  // Build one regex from all READINGS keys, longest first to avoid partial matches
  const words = Object.keys(READINGS).sort((a, b) => b.length - a.length);
  const escaped = words.map(w => w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
  const re = new RegExp(escaped.join('|'), 'g');
  return parts.map((part, i) => {
    // Odd indices are HTML tags — leave them untouched
    if (i % 2 === 1) return part;
    return part.replace(re, m => `<ruby>${m}<rt>${READINGS[m]}</rt></ruby>`);
  }).join('');
}

let furiganaOn = true;
function toggleFurigana() {
  furiganaOn = !furiganaOn;
  document.body.classList.toggle('no-furigana', !furiganaOn);
  document.getElementById('furi-btn').textContent = furiganaOn ? 'ルビあり' : 'ルビなし';
}
